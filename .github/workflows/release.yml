name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x86_64
            oscan_archive: oscan-v{OSCAN_VER}-windows-x86_64-full.zip
            oscan_bin: oscan.exe
            output: oscanweb-windows-x86_64.exe
          - os: ubuntu-latest
            name: linux-x86_64
            oscan_archive: oscan-v{OSCAN_VER}-linux-x86_64-full.tar.xz
            oscan_bin: oscan
            output: oscanweb-linux-x86_64
          - os: macos-15
            name: macos-x86_64
            oscan_archive: oscan-v{OSCAN_VER}-macos-x86_64.tar.gz
            oscan_bin: oscan
            output: oscanweb-macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${{ github.ref_name }}"
          fi
          echo "tag=$V" >> "$GITHUB_OUTPUT"

      - name: Install Oscan
        shell: bash
        run: |
          set -euo pipefail
          OSCAN_TAG=$(gh release view --repo lucabol/Oscan --json tagName --jq .tagName)
          OSCAN_VER="${OSCAN_TAG#v}"
          echo "Installing Oscan $OSCAN_TAG"

          ARCHIVE_TEMPLATE="${{ matrix.oscan_archive }}"
          ARCHIVE_NAME="${ARCHIVE_TEMPLATE//\{OSCAN_VER\}/$OSCAN_VER}"

          gh release download "$OSCAN_TAG" \
            --repo lucabol/Oscan \
            --pattern "$ARCHIVE_NAME" \
            --dir /tmp/oscan-dl

          cd /tmp/oscan-dl
          case "$ARCHIVE_NAME" in
            *.zip)     unzip -q "$ARCHIVE_NAME" ;;
            *.tar.xz)  tar xf "$ARCHIVE_NAME" ;;
            *.tar.gz)  tar xf "$ARCHIVE_NAME" ;;
          esac

          OSCAN_BIN=$(find . -name "${{ matrix.oscan_bin }}" -type f | head -1)
          if [ -z "$OSCAN_BIN" ]; then
            echo "ERROR: Could not find ${{ matrix.oscan_bin }}"
            find . -type f
            exit 1
          fi

          OSCAN_DIR=$(dirname "$(realpath "$OSCAN_BIN")")
          chmod +x "$OSCAN_DIR/${{ matrix.oscan_bin }}" 2>/dev/null || true
          echo "$OSCAN_DIR" >> "$GITHUB_PATH"
          echo "Oscan installed from $OSCAN_DIR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build browser
        shell: bash
        run: |
          mkdir -p build
          EXTRA=(--extra-c js_bridge.c --extra-c libs/quickjs/quickjs.c --extra-cflags -I.)
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXTRA+=(--extra-cflags -lwinhttp)
          fi
          oscan browser.osc -o "build/${{ matrix.output }}" "${EXTRA[@]}"
          ls -la "build/${{ matrix.output }}"

      - name: Run tests
        shell: bash
        run: |
          oscan tests/test_url.osc --run
          oscan tests/test_html.osc --run

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: build/${{ matrix.output }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries and checksums
        run: |
          mkdir -p upload
          find artifacts -type f -exec cp {} upload/ \;
          cd upload
          sha256sum * > SHA256SUMS.txt
          echo "Release files:"
          ls -la

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OscaWeb ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: upload/*
