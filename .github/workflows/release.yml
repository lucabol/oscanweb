name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  OSCAN_VERSION: 0.0.37

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x86_64
            backend: native
            trusted_native_link_arg: -AllowElevatedNativeLink
            oscan_archive: oscan-v{OSCAN_VER}-windows-x86_64-full.zip
            oscan_bin: oscan.exe
            output: oscanweb-windows-x86_64.exe
          - os: ubuntu-latest
            name: linux-x86_64
            backend: native
            trusted_native_link_arg: ""
            oscan_archive: oscan-v{OSCAN_VER}-linux-x86_64-full.tar.xz
            oscan_bin: oscan
            output: oscanweb-linux-x86_64
          - os: macos-15
            name: macos-x86_64
            backend: c
            trusted_native_link_arg: ""
            oscan_archive: oscan-v{OSCAN_VER}-macos-x86_64.tar.gz
            oscan_bin: oscan
            output: oscanweb-macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Build script argument tests
        shell: pwsh
        run: ./tests/test_build_common.ps1

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${{ github.ref_name }}"
          fi
          echo "tag=$V" >> "$GITHUB_OUTPUT"

      - name: Install Oscan
        shell: bash
        run: |
          set -euo pipefail
          OSCAN_TAG="v${OSCAN_VERSION}"
          gh release view "$OSCAN_TAG" --repo lucabol/Oscan >/dev/null
          OSCAN_VER="${OSCAN_TAG#v}"
          echo "Installing Oscan $OSCAN_TAG"

          ARCHIVE_TEMPLATE="${{ matrix.oscan_archive }}"
          ARCHIVE_NAME="${ARCHIVE_TEMPLATE//\{OSCAN_VER\}/$OSCAN_VER}"

          gh release download "$OSCAN_TAG" \
            --repo lucabol/Oscan \
            --pattern "$ARCHIVE_NAME" \
            --dir /tmp/oscan-dl

          cd /tmp/oscan-dl
          case "$ARCHIVE_NAME" in
            *.zip)     unzip -q "$ARCHIVE_NAME" ;;
            *.tar.xz)  tar xf "$ARCHIVE_NAME" ;;
            *.tar.gz)  tar xf "$ARCHIVE_NAME" ;;
          esac

          OSCAN_BIN=$(find . -name "${{ matrix.oscan_bin }}" -type f | head -1)
          if [ -z "$OSCAN_BIN" ]; then
            echo "ERROR: Could not find ${{ matrix.oscan_bin }}"
            find . -type f
            exit 1
          fi

          OSCAN_DIR=$(dirname "$(realpath "$OSCAN_BIN")")
          chmod +x "$OSCAN_DIR/${{ matrix.oscan_bin }}" 2>/dev/null || true
          # On Windows, convert to a native path so pwsh in later steps can
          # find oscan.exe via PATH (bash-style paths like /d/a/... are not
          # recognized by PowerShell).
          if [ "${{ runner.os }}" = "Windows" ]; then
            OSCAN_DIR=$(cygpath -w "$OSCAN_DIR")
          fi
          echo "$OSCAN_DIR" >> "$GITHUB_PATH"
          echo "Oscan installed from $OSCAN_DIR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build browser
        shell: pwsh
        run: ./build.ps1 -Backend ${{ matrix.backend }} ${{ matrix.trusted_native_link_arg }} -Output "build/${{ matrix.output }}" -WindowsGui -V

      - name: Run tests
        shell: pwsh
        run: ./build.ps1 -Backend ${{ matrix.backend }} ${{ matrix.trusted_native_link_arg }} -Test -V

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: build/${{ matrix.output }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries and checksums
        run: |
          mkdir -p upload
          find artifacts -type f -exec cp {} upload/ \;
          cd upload
          sha256sum * > SHA256SUMS.txt
          echo "Release files:"
          ls -la

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OscaWeb ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: upload/*
